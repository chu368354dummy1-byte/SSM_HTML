name: Hourly HTML Capture

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  capture:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Debug Worker
        env:
          CF_WORKER_URL: ${{ secrets.CF_WORKER_URL }}
          CF_PROXY_SECRET: ${{ secrets.CF_PROXY_SECRET }}
        run: |
          curl -v \
            -H "x-proxy-secret: $CF_PROXY_SECRET" \
            "$CF_WORKER_URL?debug=1"

      - name: Capture HTML      
        env:
          CF_WORKER_URL:    ${{ secrets.CF_WORKER_URL }}
          CF_PROXY_SECRET:  ${{ secrets.CF_PROXY_SECRET }}
        run: python capture_html.py

      - name: Show log on failure
        if: failure()
        run: cat logs/capture.log 2>/dev/null || echo "No log file found"

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "snapshot $(date -u '+%Y-%m-%d_%H-%M-%S')"
          git push
